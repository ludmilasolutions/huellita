<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Mi Huellita</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5D4E37',
                        secondary: '#F5E6D3',
                        accent: '#E8985E',
                        success: '#6B9B7A',
                        error: '#C75D5D',
                        background: '#FDF8F3',
                    },
                    fontFamily: {
                        heading: ['Nunito', 'sans-serif'],
                        body: ['Open Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-background font-body min-h-screen flex flex-col">
    <header class="bg-primary text-white shadow-lg">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-accent rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                    </div>
                    <span class="font-heading font-bold text-xl">Mi Huellita</span>
                </a>
                <a href="index.html" class="text-secondary hover:text-accent transition-colors">Volver al inicio</a>
            </div>
        </nav>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-lg">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <h1 class="font-heading font-bold text-3xl text-primary mb-2">Crear tu cuenta</h1>
                    <p class="text-gray-600">Únete a Mi Huellita</p>
                </div>

                <div id="error-message" class="hidden bg-error/10 border border-error text-error px-4 py-3 rounded-lg mb-6 text-sm"></div>
                <div id="success-message" class="hidden bg-success/10 border border-success text-success px-4 py-3 rounded-lg mb-6 text-sm"></div>

                <div id="step-1">
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-3">¿Cómo te vas a registrar?</label>
                        <div class="grid grid-cols-1 gap-4">
                            <label class="role-option border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-accent transition-colors has-[:checked]:border-accent has-[:checked]:bg-secondary">
                                <input type="radio" name="role" value="owner" class="sr-only" checked>
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
                                        <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <span class="font-heading font-semibold text-primary block">Soy Dueño de Mascota</span>
                                        <span class="text-sm text-gray-500">Tengo una o más mascotas</span>
                                    </div>
                                </div>
                            </label>
                            <label class="role-option border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-accent transition-colors has-[:checked]:border-accent has-[:checked]:bg-secondary">
                                <input type="radio" name="role" value="vet" class="sr-only">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-success/10 rounded-full flex items-center justify-center">
                                        <svg class="w-5 h-5 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <span class="font-heading font-semibold text-primary block">Soy Veterinaria</span>
                                        <span class="text-sm text-gray-500">Tengo una clínica veterinaria</span>
                                    </div>
                                </div>
                            </label>
                            <label class="role-option border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-accent transition-colors has-[:checked]:border-accent has-[:checked]:bg-secondary">
                                <input type="radio" name="role" value="shelter" class="sr-only">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-accent/10 rounded-full flex items-center justify-center">
                                        <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <span class="font-heading font-semibold text-primary block">Soy Refugio</span>
                                        <span class="text-sm text-gray-500">Represento un refugio de animales</span>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button
                        id="continue-btn"
                        class="w-full bg-primary hover:bg-brown-800 text-white font-heading font-semibold py-3 px-4 rounded-lg transition-colors"
                    >
                        Continuar
                    </button>
                </div>

                <form id="register-form" class="hidden space-y-4">
                    <button
                        type="button"
                        id="back-btn"
                        class="text-gray-500 hover:text-primary text-sm mb-4"
                    >
                        ← Volver a elegir tipo de cuenta
                    </button>

                    <button
                        id="google-register-btn"
                        type="button"
                        class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-300 hover:border-gray-400 text-gray-700 font-semibold py-3 px-4 rounded-lg transition-colors"
                    >
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Registrarse con Google
                    </button>

                    <div class="relative my-4">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-white text-gray-500">o con email</span>
                        </div>
                    </div>

                    <div>
                        <label for="full-name" class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
                        <input
                            type="text"
                            id="full-name"
                            name="full-name"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                            placeholder="Juan Pérez"
                        >
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                            placeholder="tu@email.com"
                        >
                    </div>

                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Teléfono (opcional)</label>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                            placeholder="+54 11 1234 5678"
                        >
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            minlength="6"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                            placeholder="Mínimo 6 caracteres"
                        >
                    </div>

                    <div id="vet-fields" class="hidden space-y-4 p-4 bg-gray-50 rounded-lg">
                        <h3 class="font-heading font-semibold text-primary">Datos de la Clínica</h3>
                        <div>
                            <label for="clinic-name" class="block text-sm font-medium text-gray-700 mb-1">Nombre de la clínica</label>
                            <input
                                type="text"
                                id="clinic-name"
                                name="clinic-name"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                                placeholder="Veterinaria Mi Mascota"
                            >
                        </div>
                        <div>
                            <label for="clinic-address" class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                            <input
                                type="text"
                                id="clinic-address"
                                name="clinic-address"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                                placeholder="Calle 123, Ciudad"
                            >
                        </div>
                        <div>
                            <label for="clinic-license" class="block text-sm font-medium text-gray-700 mb-1">Matícula profesional</label>
                            <input
                                type="text"
                                id="clinic-license"
                                name="clinic-license"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                                placeholder="Número de matrícula"
                            >
                        </div>
                    </div>

                    <div id="shelter-fields" class="hidden space-y-4 p-4 bg-gray-50 rounded-lg">
                        <h3 class="font-heading font-semibold text-primary">Datos del Refugio</h3>
                        <div>
                            <label for="shelter-name" class="block text-sm font-medium text-gray-700 mb-1">Nombre del refugio</label>
                            <input
                                type="text"
                                id="shelter-name"
                                name="shelter-name"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                                placeholder="Refugio Huellas"
                            >
                        </div>
                        <div>
                            <label for="shelter-description" class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
                            <textarea
                                id="shelter-description"
                                name="shelter-description"
                                rows="2"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                                placeholder="Describe tu refugio..."
                            ></textarea>
                        </div>
                    </div>

                    <button
                        type="submit"
                        class="w-full bg-primary hover:bg-brown-800 text-white font-heading font-semibold py-3 px-4 rounded-lg transition-colors"
                    >
                        Crear Cuenta
                    </button>
                </form>

                <p class="text-center text-gray-600 mt-6">
                    ¿Ya tienes cuenta? 
                    <a href="login.html" class="text-accent hover:underline font-semibold">Inicia sesión</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="bg-primary text-white py-4 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm text-gray-300">Desarrollado por <strong>AFM Solutions</strong></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const { supabase } = createSupabaseClient();
            const { handleGoogleRegister, handleEmailRegister, checkAuthAndRedirect } = authModule(supabase);

            checkAuthAndRedirect();

            const params = new URLSearchParams(window.location.search);
            const roleParam = params.get('role');
            if (roleParam) {
                const roleInput = document.querySelector(`input[name="role"][value="${roleParam}"]`);
                if (roleInput) roleInput.checked = true;
            }

            const step1 = document.getElementById('step-1');
            const registerForm = document.getElementById('register-form');
            const continueBtn = document.getElementById('continue-btn');
            const backBtn = document.getElementById('back-btn');
            const vetFields = document.getElementById('vet-fields');
            const shelterFields = document.getElementById('shelter-fields');

            continueBtn.addEventListener('click', () => {
                const role = document.querySelector('input[name="role"]:checked').value;
                sessionStorage.setItem('selectedRole', role);
                
                step1.classList.add('hidden');
                registerForm.classList.remove('hidden');
                
                if (role === 'vet') {
                    vetFields.classList.remove('hidden');
                } else if (role === 'shelter') {
                    shelterFields.classList.remove('hidden');
                }
            });

            backBtn.addEventListener('click', () => {
                registerForm.classList.add('hidden');
                step1.classList.remove('hidden');
                vetFields.classList.add('hidden');
                shelterFields.classList.add('hidden');
            });

            document.getElementById('google-register-btn').addEventListener('click', () => {
                const role = sessionStorage.getItem('selectedRole') || 'owner';
                handleGoogleRegister(role);
            });

            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const role = sessionStorage.getItem('selectedRole') || 'owner';
                handleEmailRegister(role);
            });
        });
    </script>
</body>
</html>
