<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mi Huellita</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5D4E37',
                        secondary: '#F5E6D3',
                        accent: '#E8985E',
                        success: '#6B9B7A',
                        error: '#C75D5D',
                        background: '#FDF8F3',
                    },
                    fontFamily: {
                        heading: ['Nunito', 'sans-serif'],
                        body: ['Open Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-background font-body min-h-screen flex flex-col">
    <header class="bg-primary text-white shadow-lg">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-accent rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                    </div>
                    <span class="font-heading font-bold text-xl">Mi Huellita</span>
                </a>
                <a href="index.html" class="text-secondary hover:text-accent transition-colors">Volver al inicio</a>
            </div>
        </nav>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <h1 class="font-heading font-bold text-3xl text-primary mb-2">Bienvenido de nuevo</h1>
                    <p class="text-gray-600">Inicia sesión para continuar</p>
                </div>

                <div id="error-message" class="hidden bg-error/10 border border-error text-error px-4 py-3 rounded-lg mb-6 text-sm"></div>
                <div id="success-message" class="hidden bg-success/10 border border-success text-success px-4 py-3 rounded-lg mb-6 text-sm"></div>

                <button
                    id="google-login-btn"
                    class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-300 hover:border-gray-400 text-gray-700 font-semibold py-3 px-4 rounded-lg transition-colors"
                >
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continuar con Google
                </button>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">o</span>
                    </div>
                </div>

                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                            placeholder="tu@email.com"
                        >
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition-colors"
                            placeholder="••••••••"
                        >
                    </div>
                    <button
                        type="submit"
                        class="w-full bg-primary hover:bg-brown-800 text-white font-heading font-semibold py-3 px-4 rounded-lg transition-colors"
                    >
                        Iniciar Sesión
                    </button>
                </form>

                <p class="text-center text-gray-600 mt-6">
                    ¿No tienes cuenta? 
                    <a href="register.html" class="text-accent hover:underline font-semibold">Regístrate</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="bg-primary text-white py-4 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm text-gray-300">Desarrollado por <strong>AFM Solutions</strong></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const { supabase } = createSupabaseClient();
            const { handleGoogleLogin, handleEmailLogin, checkAuthAndRedirect } = authModule(supabase);

            checkAuthAndRedirect();

            document.getElementById('google-login-btn').addEventListener('click', handleGoogleLogin);
            document.getElementById('login-form').addEventListener('submit', handleEmailLogin);
        });
    </script>
</body>
</html>
